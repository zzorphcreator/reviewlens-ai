services:
  - type: web
    name: reviewlens-ai-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QUEUE_MODE
        value: rq
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: RUNNING_IN_DOCKER
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SCRAPER_PROVIDER_ORDER
        value: brightdata,zyte,http
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: BRIGHTDATA_ZONE
        sync: false
      - key: ZYTE_API_KEY
        sync: false

  - type: worker
    name: reviewlens-ai-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh -c 'rq worker --url "$REDIS_URL" import scrape'
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QUEUE_MODE
        value: rq
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: RUNNING_IN_DOCKER
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SCRAPER_PROVIDER_ORDER
        value: brightdata,zyte,http
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: BRIGHTDATA_ZONE
        sync: false
      - key: ZYTE_API_KEY
        sync: false

