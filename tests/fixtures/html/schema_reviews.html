<!doctype html>
<html>
  <head>
    <title>Example Reviews</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "ReviewLens",
        "review": [
          {
            "@type": "Review",
            "author": { "@type": "Person", "name": "Ada Lovelace" },
            "reviewRating": { "@type": "Rating", "ratingValue": "5" },
            "name": "Excellent import",
            "reviewBody": "The deterministic import made the workflow predictable.",
            "datePublished": "2026-04-27"
          },
          {
            "@type": "Review",
            "author": "Grace Hopper",
            "reviewRating": { "ratingValue": 4 },
            "reviewBody": "Schema scraping is a useful next phase.",
            "datePublished": "2026-04-26"
          }
        ]
      }
    </script>
  </head>
  <body>
    <h1>Reviews</h1>
  </body>
</html>
